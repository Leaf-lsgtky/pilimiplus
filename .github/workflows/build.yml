name: Build

on:
  push:
    branches: ['*']
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            NAME=${GITHUB_REF_NAME#v}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAME=${{ github.event.inputs.version_name }}
          else
            NAME="0.0.0-dev"
          fi
          IFS='.' read -r MAJ MIN PAT <<< "$NAME"
          CODE=$(( MAJ * 10000 + MIN * 100 + (PAT + 0) ))
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Android signing
        if: steps.signing.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          echo "SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        if: steps.signing.outputs.available == 'true'
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ env.SIGNING_KEY_PASSWORD }}
        run: |
          gradle assembleRelease \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ steps.ver.outputs.code }}

      - name: Build debug APK
        if: steps.signing.outputs.available != 'true'
        run: |
          gradle assembleDebug \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ steps.ver.outputs.code }}

      - name: Upload release APK
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: bbspace-${{ steps.ver.outputs.name }}-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload debug APK
        if: steps.signing.outputs.available != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: bbspace-${{ steps.ver.outputs.name }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body_path: .github/release-notes.md

      - name: Create GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch' && steps.signing.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          name: v${{ steps.ver.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: app/build/outputs/apk/release/*.apk
          body_path: .github/release-notes.md
